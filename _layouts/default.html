<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
        <title>{{ page.title }}</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <!-- Bootstrap core CSS -->
        <link rel="stylesheet" href="/css/bootstrap.min.css" />
        <!-- Custom styles for this template -->
        <link rel="stylesheet" href="/css/blog.css" />
        <link rel="stylesheet" href="/css/font-awesome-4.2.0/css/font-awesome.min.css" />
        <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
        <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
        <!--[if lt IE 9]>
            <script language="javascript" src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
            <script language="javascript" src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
        <![endif]-->
        <style type="text/css">
         html{height:100%;}
         body{min-height:100%;margin:0;padding:0;position:relative;}

         .header{background-color: #ffe4c4;}
         .main{padding-bottom:100px;background-color: #bdb76b;}/* main的padding-bottom值要等于或大于footer的height值 */
         .footer{position:absolute;bottom:20px;width:100%;height:100px;text-align:center;display:block;clear:both}
        </style>        
    </head>
    <body>
        <div id="nav" style="margin-bottom:10px">
            {% include menu.html %}
        </div>

        <div class="container">
            <div class="row">
                <div class="col-md-8 blog-main">
                    <div class="blog-header">
                        <p class="blog-title">{{ site.title }} <sup class="blog-description">{{ site.description }}</sup>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-8 blog-main">
                    {{ content }}
                </div>
                <div class="col-md-4 blog-sidebar">
                    <div id="latest-post">
                        {% include latest-posts.html %}
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="row">
                {% include footer.html %}
            </div>
        </div>
        <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
        <script language="javascript" src="/js/jquery-1.11.2.min.js"></script>
        <!-- Include all compiled plugins (below), or include individual files as needed -->
        <script language="javascript" src="/js/bootstrap.min.js"></script>
        <!-- A small message for those who do not use js. -->
    </body>
</html>
